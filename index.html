<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>정보처리기사 필기 기출 퀴즈</title>
<style>
:root{--bg:#f6f7fb;--card:#fff;--ink:#151923;--muted:#687083;--line:#dde2ee;--brand:#3345ff;--good:#0b8f55;--bad:#d23f31;--soft:#eef1ff;--shadow:0 10px 30px rgba(21,25,35,.08)}
*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#f7f8ff 0%,#f6f7fb 50%,#eef1f7 100%);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink)}button{font:inherit}.app{max-width:920px;margin:0 auto;min-height:100dvh;padding:16px 14px 92px}.top{position:sticky;top:0;z-index:20;margin:-16px -14px 14px;padding:14px;background:rgba(246,247,251,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}.bar{display:flex;gap:10px;align-items:center;justify-content:space-between}.title{font-weight:900;font-size:20px;letter-spacing:-.03em}.subtitle{font-size:12px;color:var(--muted);margin-top:3px}.pill{border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 11px;font-weight:800;box-shadow:var(--shadow)}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}.card{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:16px;box-shadow:var(--shadow)}.yearBtn,.roundBtn{width:100%;text-align:left;border:1px solid var(--line);background:#fff;border-radius:20px;padding:16px;box-shadow:var(--shadow);cursor:pointer}.yearBtn b{font-size:26px}.yearBtn span,.roundBtn span{display:block;color:var(--muted);font-size:13px;margin-top:4px}.roundBtn b{font-size:18px}.actions{display:flex;gap:8px;flex-wrap:wrap}.btn{border:0;border-radius:16px;padding:12px 14px;background:var(--brand);color:#fff;font-weight:900;cursor:pointer}.btn.secondary{background:#fff;color:var(--ink);border:1px solid var(--line)}.btn.danger{background:#fff;color:var(--bad);border:1px solid #ffd2ce}.btn.good{background:#fff;color:var(--good);border:1px solid #bdebd3}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:10px 0}.stat{background:#fff;border:1px solid var(--line);border-radius:16px;padding:10px;text-align:center}.stat b{display:block;font-size:18px}.stat span{font-size:11px;color:var(--muted)}.progress{height:10px;background:#e4e8f5;border-radius:999px;overflow:hidden;margin-top:12px}.progress>div{height:100%;background:linear-gradient(90deg,var(--brand),#7d58ff);width:0%}.qhead{display:flex;gap:8px;align-items:flex-start;justify-content:space-between;margin-bottom:10px}.qno{font-weight:950;font-size:18px}.subject{font-size:12px;color:var(--muted);margin-top:3px}.qimgWrap{background:#fff;border:1px solid var(--line);border-radius:18px;padding:10px;overflow:hidden}.qimg{display:block;width:100%;height:auto;border-radius:10px}.choices{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin:14px 0}.choice{border:1px solid var(--line);background:#fff;border-radius:18px;padding:14px 0;font-size:22px;font-weight:900;box-shadow:0 4px 12px rgba(21,25,35,.05);cursor:pointer}.choice.selected{outline:3px solid rgba(51,69,255,.25);border-color:var(--brand)}.choice.correct{background:#e9fff3;border-color:#8eddb6;color:var(--good)}.choice.wrong{background:#fff1f0;border-color:#ffb6ad;color:var(--bad)}.feedback{display:none;border-radius:18px;padding:13px 14px;font-weight:900;margin-bottom:12px}.feedback.show{display:block}.feedback.good{background:#e9fff3;color:var(--good);border:1px solid #a9e9c6}.feedback.bad{background:#fff1f0;color:var(--bad);border:1px solid #ffb6ad}.explainBtn{border:0;border-radius:14px;padding:10px 12px;background:#fff;color:var(--bad);font-weight:950;margin-top:10px;box-shadow:0 4px 12px rgba(21,25,35,.06);cursor:pointer}.explanation{display:none;background:#fff;border:1px solid var(--line);border-radius:18px;padding:14px;margin:-2px 0 14px;box-shadow:var(--shadow);line-height:1.6}.explanation.show{display:block}.exTitle{font-weight:950;font-size:16px;margin-bottom:8px}.exLine{font-size:14px;margin:5px 0}.exLine b{display:inline-block;min-width:58px;color:var(--muted)}.exBody{white-space:pre-wrap;font-size:14px;line-height:1.7;margin-top:10px}.exCorrect{font-weight:900;color:var(--good)}.exMine{font-weight:900;color:var(--bad)}.bottomNav{position:fixed;left:0;right:0;bottom:0;z-index:30;background:rgba(255,255,255,.94);backdrop-filter:blur(12px);border-top:1px solid var(--line);padding:10px 14px calc(10px + env(safe-area-inset-bottom))}.bottomInner{max-width:920px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr 1.2fr;gap:9px}.hidden{display:none!important}.list{display:grid;grid-template-columns:repeat(auto-fill,minmax(54px,1fr));gap:8px}.numBtn{border:1px solid var(--line);background:#fff;border-radius:14px;padding:10px 0;font-weight:900}.numBtn.done{background:var(--soft);border-color:#cdd4ff}.numBtn.bad{background:#fff1f0;border-color:#ffb6ad;color:var(--bad)}.numBtn.good{background:#e9fff3;border-color:#a9e9c6;color:var(--good)}.small{font-size:12px;color:var(--muted);line-height:1.55}.toast{position:fixed;left:50%;bottom:88px;transform:translateX(-50%);background:#151923;color:#fff;border-radius:999px;padding:10px 14px;font-size:13px;font-weight:800;box-shadow:var(--shadow);z-index:50;opacity:0;pointer-events:none;transition:.2s}.toast.show{opacity:1}.kbd{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;background:#eef1f7;border-radius:6px;padding:1px 5px}@media(max-width:520px){.app{padding-left:10px;padding-right:10px}.top{margin-left:-10px;margin-right:-10px}.title{font-size:18px}.choices{gap:7px}.choice{font-size:21px;padding:13px 0}.qimgWrap{padding:6px;border-radius:16px}.card{padding:14px}.bottomInner{grid-template-columns:1fr 1fr 1.15fr}.btn{padding:12px 10px}}
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <div class="bar">
      <div><div class="title" id="appTitle">정보처리기사 필기 퀴즈</div><div class="subtitle" id="appSub">연도별 · 회차별 · 원본 문제 이미지 그대로</div></div>
      <button class="pill" id="homeBtn">홈</button>
    </div>
    <div class="progress hidden" id="progress"><div></div></div>
  </div>
  <section id="homeView">
    <div class="card" style="margin-bottom:12px">
      <b>📱 폰에서 바로 푸는 기출 문제 은행</b>
      <p class="small">문제는 PDF의 원본 문제 영역을 잘라 이미지로 보여줍니다. 보기/문항 문구를 다시 작성하지 않아서 내용 보존 우선 모드입니다. 복수 정답/전항 정답도 정답표 기준으로 처리합니다.</p>
      <div class="stats" id="allStats"></div>
    </div>
    <div class="grid" id="yearGrid"></div>
  </section>
  <section id="roundView" class="hidden">
    <div class="card" style="margin-bottom:12px"><div class="actions"><button class="btn secondary" id="backToYears">← 연도 선택</button><button class="btn danger" id="resetYear">이 연도 기록 초기화</button></div></div>
    <div class="grid" id="roundGrid"></div>
  </section>
  <section id="quizView" class="hidden">
    <div class="qhead"><div><div class="qno" id="qNo"></div><div class="subject" id="subject"></div></div><button class="pill" id="openList">문항표</button></div>
    <div class="qimgWrap"><img id="qImg" class="qimg" alt="문제 이미지" /></div>
    <div class="choices" id="choices"></div>
    <div id="feedback" class="feedback"></div>
    <div id="explanation" class="explanation"></div>
    <div class="card"><div class="actions"><button class="btn secondary" id="showAnswer">정답 보기</button><button class="btn good" id="onlyWrong">오답만 풀기</button><button class="btn danger" id="resetExam">이 회차 기록 초기화</button></div><div class="stats" id="examStats"></div><p class="small">팁: PC에서는 <span class="kbd">1</span>~<span class="kbd">4</span> 키로 답 선택, 방향키로 이전/다음 이동 가능.</p></div>
  </section>
  <section id="listView" class="hidden">
    <div class="card" style="margin-bottom:12px"><div class="actions"><button class="btn secondary" id="backToQuiz">← 문제로</button><button class="btn" id="goFirstWrong">첫 오답으로</button></div><p class="small">초록은 정답 처리, 빨강은 오답 처리, 보라빛은 풀이 완료입니다.</p></div>
    <div class="list" id="numList"></div>
  </section>
</div>
<div class="bottomNav hidden" id="bottomNav"><div class="bottomInner"><button class="btn secondary" id="prevBtn">이전</button><button class="btn secondary" id="nextBtn">다음</button><button class="btn" id="finishBtn">결과 보기</button></div></div>
<div class="toast" id="toast"></div>
<script src="data.js"></script>
<script>
const $=s=>document.querySelector(s);const $$=s=>[...document.querySelectorAll(s)];const circ=['①','②','③','④'];let state={view:'home',year:null,exam:null,idx:0,wrongMode:false,wrongList:null};const keyFor=e=>`ipe_quiz_${e.year}_${e.round}`;const load=e=>JSON.parse(localStorage.getItem(keyFor(e))||'{}');const save=(e,r)=>localStorage.setItem(keyFor(e),JSON.stringify(r));
function ansChoices(a){if(a==='전항정답')return circ;return (a||'').match(/[①②③④]/g)||[]}function ansText(a){return a==='전항정답'?'전항정답(①②③④)':ansChoices(a).join(' 또는 ')}function isCorrect(p,a){return ansChoices(a).includes(p)}
function toast(t){const el=$('#toast');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1200)}function years(){return [...new Set(QUIZ_DATA.map(e=>e.year))].sort((a,b)=>b-a)}function examsByYear(y){return QUIZ_DATA.filter(e=>e.year===y).sort((a,b)=>a.round-b.round)}
function setView(v){['homeView','roundView','quizView','listView'].forEach(id=>$('#'+id).classList.add('hidden'));$('#'+v+'View').classList.remove('hidden');$('#bottomNav').classList.toggle('hidden',v!=='quiz');$('#progress').classList.toggle('hidden',v!=='quiz');state.view=v}
function getRecord(){return state.exam?load(state.exam):{}}function answeredCount(e){return Object.keys(load(e)).length}function score(e){const r=load(e);let good=0,bad=0;for(const q of e.questions){if(r[q.no]){if(isCorrect(r[q.no],q.answer))good++;else bad++}}return{good,bad,done:good+bad,total:e.questions.length}}
function renderHome(){setView('home');$('#appTitle').textContent='정보처리기사 필기 퀴즈';$('#appSub').textContent=`총 ${QUIZ_DATA.length}회차 · ${QUIZ_DATA.reduce((a,e)=>a+e.questions.length,0)}문항`;const total=QUIZ_DATA.reduce((a,e)=>a+e.questions.length,0);const done=QUIZ_DATA.reduce((a,e)=>a+answeredCount(e),0);$('#allStats').innerHTML=`<div class="stat"><b>${QUIZ_DATA.length}</b><span>회차</span></div><div class="stat"><b>${total}</b><span>전체 문항</span></div><div class="stat"><b>${done}</b><span>푼 문항</span></div>`;$('#yearGrid').innerHTML=years().map(y=>{const arr=examsByYear(y);const qs=arr.reduce((a,e)=>a+e.questions.length,0);const dn=arr.reduce((a,e)=>a+answeredCount(e),0);return`<button class="yearBtn" data-year="${y}"><b>${y}년</b><span>${arr.length}회차 · ${dn}/${qs}문항 풀이</span></button>`}).join('');$$('.yearBtn').forEach(b=>b.onclick=()=>renderRounds(+b.dataset.year))}
function renderRounds(y){state.year=y;setView('round');$('#appTitle').textContent=`${y}년`;$('#appSub').textContent='회차 선택';$('#roundGrid').innerHTML=examsByYear(y).map(e=>{const s=score(e);return`<button class="roundBtn" data-round="${e.round}"><b>${e.round}회</b><span>${s.done}/${s.total} 풀이 · 정답 ${s.good} · 오답 ${s.bad}</span></button>`}).join('');$$('.roundBtn').forEach(b=>b.onclick=()=>startExam(QUIZ_DATA.find(e=>e.year===state.year&&e.round===+b.dataset.round)))}
function startExam(e,idx=0){state.exam=e;state.idx=idx;state.wrongMode=false;state.wrongList=null;renderQuiz()}function currentQuestions(){return state.wrongMode&&state.wrongList?state.wrongList:state.exam.questions}
function renderQuiz(){setView('quiz');const e=state.exam;const qs=currentQuestions();if(!qs.length){state.wrongMode=false;state.wrongList=null;toast('오답이 없어. 클린 그 자체 🧼');return renderQuiz()}if(state.idx>=qs.length)state.idx=qs.length-1;if(state.idx<0)state.idx=0;const q=qs[state.idx];const rec=getRecord();$('#appTitle').textContent=`${e.year}년 ${e.round}회`;$('#appSub').textContent=state.wrongMode?'오답만 다시 풀기':'전체 문제 풀기';$('#qNo').textContent=`${q.no}번`;$('#subject').textContent=q.subject;$('#qImg').src=q.image;$('#qImg').alt=`${e.year}년 ${e.round}회 ${q.no}번 문제`;$('#choices').innerHTML=circ.map(c=>`<button class="choice" data-choice="${c}">${c}</button>`).join('');const picked=rec[q.no];if(picked)markChoices(picked,q.answer);$$('.choice').forEach(btn=>btn.onclick=()=>choose(btn.dataset.choice));$('#feedback').className='feedback';$('#feedback').textContent='';hideExplanation();if(picked)showFeedback(picked,q.answer,false);renderExamStats();$('#progress>div').style.width=((state.idx+1)/qs.length*100).toFixed(1)+'%';$('#prevBtn').disabled=state.idx===0;$('#nextBtn').textContent=state.idx===qs.length-1?'마지막':'다음'}
function markChoices(picked,answer){const goods=ansChoices(answer);$$('.choice').forEach(b=>{b.classList.toggle('selected',b.dataset.choice===picked);b.classList.toggle('correct',goods.includes(b.dataset.choice));b.classList.toggle('wrong',b.dataset.choice===picked&&!goods.includes(picked))})}function hideExplanation(){const ex=$('#explanation');if(ex){ex.className='explanation';ex.innerHTML=''}}function esc(s){return String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}function showExplanation(picked,answer,mode='wrong'){const q=currentQuestions()[state.idx];const ex=$('#explanation');if(!ex)return;const body=q.explanation||'해설 데이터가 없습니다.';ex.className='explanation show';ex.innerHTML=`<div class="exTitle">교재식 해설</div><div class="exLine"><b>정답</b><span class="exCorrect">${esc(ansText(answer))}</span></div><div class="exLine"><b>내 선택</b><span class="exMine">${esc(picked||'미선택')}</span></div><div class="exBody">${esc(body)}</div>`}function showFeedback(picked,answer,pop=true){const fb=$('#feedback');const ok=isCorrect(picked,answer);hideExplanation();fb.className='feedback show '+(ok?'good':'bad');if(ok){fb.textContent='정답!'}else{fb.innerHTML=`오답!<br><button type="button" class="explainBtn" id="explainBtn">해설 보기</button>`;const btn=$('#explainBtn');if(btn)btn.onclick=()=>showExplanation(picked,answer,'wrong')}if(pop)toast(ok?'정답!':'오답 저장!')}function choose(c){const e=state.exam;const q=currentQuestions()[state.idx];const r=getRecord();r[q.no]=c;save(e,r);markChoices(c,q.answer);showFeedback(c,q.answer);renderExamStats()}function renderExamStats(){const s=score(state.exam);$('#examStats').innerHTML=`<div class="stat"><b>${s.done}/${s.total}</b><span>풀이</span></div><div class="stat"><b>${s.good}</b><span>정답</span></div><div class="stat"><b>${s.bad}</b><span>오답</span></div>`}function move(d){state.idx+=d;renderQuiz();window.scrollTo({top:0,behavior:'smooth'})}
function renderList(){setView('list');const e=state.exam;$('#appTitle').textContent=`${e.year}년 ${e.round}회 문항표`;$('#appSub').textContent='문항 바로가기';const r=load(e);$('#numList').innerHTML=e.questions.map(q=>{let cls='';if(r[q.no])cls=isCorrect(r[q.no],q.answer)?'good':'bad';return`<button class="numBtn ${cls}" data-no="${q.no}">${q.no}</button>`}).join('');$$('.numBtn').forEach(b=>b.onclick=()=>{state.wrongMode=false;state.wrongList=null;state.idx=state.exam.questions.findIndex(q=>q.no===+b.dataset.no);renderQuiz()})}
function subjectBreakdown(e){const r=load(e);return [0,1,2,3,4].map(i=>{const start=i*20+1,end=start+19;let good=0,bad=0,done=0;for(const q of e.questions){if(q.no>=start&&q.no<=end){if(r[q.no]){done++;if(isCorrect(r[q.no],q.answer))good++;else bad++}}}const score=good*5;return{name:`${i+1}과목`,start,end,done,good,bad,score,passed:score>=40}})}
function finish(){const s=score(state.exam);const subjects=subjectBreakdown(state.exam);const totalScore=subjects.reduce((a,x)=>a+x.score,0);const avg=Math.round((totalScore/5)*10)/10;const subjectLines=subjects.map(x=>`${x.name} (${x.start}-${x.end}번): ${x.score}점 / 100점 (${x.good}/20정답, 풀이 ${x.done}/20)${x.passed?'':' ⚠ 과락'}`).join('\n');alert(`${state.exam.year}년 ${state.exam.round}회 결과

[전체]
풀이: ${s.done}/${s.total}
정답: ${s.good}
오답: ${s.bad}
정답률: ${s.done?Math.round(s.good/s.done*100):0}%
총점: ${totalScore}/500
평균: ${avg}점

[과목별 점수]
${subjectLines}`)}
$('#homeBtn').onclick=renderHome;$('#backToYears').onclick=renderHome;$('#prevBtn').onclick=()=>move(-1);$('#nextBtn').onclick=()=>move(1);$('#finishBtn').onclick=finish;$('#openList').onclick=renderList;$('#backToQuiz').onclick=renderQuiz;$('#showAnswer').onclick=()=>{const q=currentQuestions()[state.idx];const r=getRecord();markChoices(r[q.no]||'',q.answer);const fb=$('#feedback');fb.className='feedback show good';fb.textContent=`정답은 ${ansText(q.answer)} 입니다.`;showExplanation(r[q.no]||'미선택',q.answer,'answer')};$('#onlyWrong').onclick=()=>{const r=load(state.exam);state.wrongList=state.exam.questions.filter(q=>r[q.no]&&!isCorrect(r[q.no],q.answer));state.wrongMode=true;state.idx=0;renderQuiz()};$('#resetExam').onclick=()=>{if(confirm('이 회차 풀이 기록을 지울까요?')){localStorage.removeItem(keyFor(state.exam));renderQuiz()}};$('#resetYear').onclick=()=>{if(confirm(`${state.year}년 기록을 전부 지울까요?`)){examsByYear(state.year).forEach(e=>localStorage.removeItem(keyFor(e)));renderRounds(state.year)}};$('#goFirstWrong').onclick=()=>{const r=load(state.exam);const i=state.exam.questions.findIndex(q=>r[q.no]&&!isCorrect(r[q.no],q.answer));if(i>=0){state.idx=i;renderQuiz()}else toast('오답이 없어. 이건 거의 방탄유리 멘탈 🛡️')};document.addEventListener('keydown',e=>{if(state.view!=='quiz')return;if(['1','2','3','4'].includes(e.key))choose(circ[+e.key-1]);if(e.key==='ArrowRight')move(1);if(e.key==='ArrowLeft')move(-1)});renderHome();
</script>
</body>
</html>
